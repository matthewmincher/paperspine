<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paperspine — Ingest</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem; color: #1a1a1a; }
    h1 { margin-bottom: 1.5rem; }
    .drop-zone {
      border: 2px dashed #ccc; border-radius: 8px; padding: 3rem; text-align: center;
      cursor: pointer; transition: border-color 0.2s, background 0.2s;
    }
    .drop-zone.dragover { border-color: #4a90d9; background: #f0f7ff; }
    .drop-zone input { display: none; }
    .status { margin-top: 1rem; padding: 0.75rem; border-radius: 4px; display: none; }
    .status.loading { display: block; background: #fff3cd; }
    .status.error { display: block; background: #f8d7da; color: #721c24; }
    .results { margin-top: 2rem; }
    .book-card {
      border: 1px solid #e0e0e0; border-radius: 6px; padding: 1rem; margin-bottom: 0.75rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .book-card .title { font-weight: 600; }
    .book-card .author { color: #555; font-size: 0.9rem; }
    .confidence { font-size: 0.75rem; padding: 0.2rem 0.5rem; border-radius: 12px; background: #e8e8e8; }
    .confidence.high { background: #d4edda; color: #155724; }
    .confidence.medium { background: #fff3cd; color: #856404; }
    .confidence.low { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <h1>Paperspine Ingest</h1>
  <div class="drop-zone" id="dropZone">
    <p>Drag & drop a bookshelf photo here, or click to select</p>
    <input type="file" id="fileInput" accept="image/*">
  </div>
  <div class="status" id="status"></div>
  <div class="results" id="results"></div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const status = document.getElementById('status');
    const results = document.getElementById('results');

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

    async function handleFile(file) {
      if (!file.type.startsWith('image/')) {
        showError('Please select an image file.');
        return;
      }

      showLoading('Analyzing bookshelf photo...');
      results.innerHTML = '';

      const formData = new FormData();
      formData.append('photo', file);

      try {
        const res = await fetch('/api/extract', { method: 'POST', body: formData });
        if (!res.ok) throw new Error((await res.json()).error || 'Upload failed');
        const data = await res.json();

        if (!data.books.length) {
          showError('No books detected in this image.');
          return;
        }

        hideStatus();
        results.innerHTML = `<h2>${data.books.length} book${data.books.length > 1 ? 's' : ''} found</h2>` +
          data.books.map(b => `
            <div class="book-card">
              <div><div class="title">${esc(b.title)}</div><div class="author">${esc(b.author)}</div></div>
              <span class="confidence ${b.confidence}">${b.confidence}</span>
            </div>
          `).join('');
      } catch (err) {
        showError(err.message);
      }
    }

    function showLoading(msg) { status.className = 'status loading'; status.textContent = msg; }
    function showError(msg) { status.className = 'status error'; status.textContent = msg; }
    function hideStatus() { status.className = 'status'; }
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  </script>
</body>
</html>
