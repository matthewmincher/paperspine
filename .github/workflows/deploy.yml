name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2
  NODE_VERSION: "24"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npm run typecheck -w @paperspine/frontend
      - run: npm run typecheck -w @paperspine/ingest
      - run: npm run typecheck -w @paperspine/infra

      - run: npm run build -w @paperspine/frontend

      - run: npm test -w @paperspine/infra
      - run: npm test -w @paperspine/ingest

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npm run build -w @paperspine/frontend
        env:
          VITE_API_URL: ${{ vars.API_DOMAIN && format('https://{0}', vars.API_DOMAIN) || '' }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy CDK stack
        run: |
          CONTEXT_ARGS=""
          if [ -n "${{ vars.API_DOMAIN }}" ]; then
            CONTEXT_ARGS="$CONTEXT_ARGS -c apiDomain=${{ vars.API_DOMAIN }}"
          fi
          if [ -n "${{ vars.FRONTEND_DOMAIN }}" ]; then
            CONTEXT_ARGS="$CONTEXT_ARGS -c frontendDomain=${{ vars.FRONTEND_DOMAIN }}"
          fi
          cd packages/infra && npx cdk deploy --all --require-approval never $CONTEXT_ARGS
